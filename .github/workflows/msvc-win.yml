name: MSVC Windows

on:
  # do this until msvc workflow addopts C++26 pack indexing
  workflow_dispatch:
#  push:
#    branches: [main]
#  pull_request:
#    branches: [main]

jobs:
  build-msvc:
    name: Build and Test
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "latest"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Create build directory
        run: mkdir build

      - name: Configure
        working-directory: build
        run: cmake .. -A x64 -DBUILD_DEMO=OFF

      - name: Build
        working-directory: build
        run: cmake --build . --config Release

      - name: Run tests
        working-directory: build
        run: ctest -C Release --output-on-failure