name: LLVM Clang:22 Linux
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-clang:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM and Clang 22
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main"
          sudo apt-get update
          sudo apt-get install -y clang-22 libc++-22-dev libc++abi-22-dev lld-22
          clang-22 --version

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1.14
        with:
          cmake-version: "4.2.0"

      - name: Create build directory
        run: mkdir -p build

      - name: Configure with CMake
        working-directory: build
        run: |
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-22 \
            -DCMAKE_C_COMPILER=clang-22 \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++" \
            -DBUILD_TESTING=ON \
            -DBUILD_DEMO=OFF

      - name: Build
        working-directory: build
        run: cmake --build . -j$(nproc)

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure
